version: "3.8"

services:
  # ─────────────────────────────────────────────
  # MongoDB — off-chain bulk data storage
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:6
    container_name: dln-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: dlnpassword
      MONGO_INITDB_DATABASE: dlnlite
    volumes:
      - mongo_data:/data/db
    networks:
      - dln-network

  # ─────────────────────────────────────────────
  # Backend — Node.js REST API
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dln-backend
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGO_URI: mongodb://admin:dlnpassword@mongodb:27017/dlnlite?authSource=admin
      ML_SERVICE_URL: http://ml-service:5000
      FABRIC_CHANNEL: dlnchannel
      FABRIC_CHAINCODE: shipment
    volumes:
      - ./blockchain/network/crypto-config:/app/crypto-config:ro
    depends_on:
      - mongodb
    networks:
      - dln-network

  # ─────────────────────────────────────────────
  # ML Service — Python Flask + XGBoost
  # ─────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: dln-ml
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      MODEL_PATH: /app/models/xgboost_model.pkl
    volumes:
      - ./ml/models:/app/models
      - ./ml/data:/app/data
    networks:
      - dln-network

  # ─────────────────────────────────────────────
  # Frontend — React Dashboard
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dln-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:4000/api
    depends_on:
      - backend
    networks:
      - dln-network

volumes:
  mongo_data:

networks:
  dln-network:
    driver: bridge
