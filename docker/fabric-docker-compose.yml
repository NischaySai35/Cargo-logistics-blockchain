networks:
  dln-fabric:
    name: dln-fabric
    driver: bridge

volumes:
  orderer.dln.com:
  peer0.shipper.dln.com:
  peer0.carrier.dln.com:
  peer0.customs.dln.com:

services:
  ca.shipper.dln.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.shipper.dln.com
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-shipper
      FABRIC_CA_SERVER_TLS_ENABLED: "false"
      FABRIC_CA_SERVER_PORT: 7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../blockchain/network/crypto-config/peerOrganizations/shipper.dln.com/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - dln-fabric

  ca.carrier.dln.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.carrier.dln.com
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-carrier
      FABRIC_CA_SERVER_TLS_ENABLED: "false"
      FABRIC_CA_SERVER_PORT: 8054
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../blockchain/network/crypto-config/peerOrganizations/carrier.dln.com/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - dln-fabric

  ca.customs.dln.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.customs.dln.com
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-customs
      FABRIC_CA_SERVER_TLS_ENABLED: "false"
      FABRIC_CA_SERVER_PORT: 10054
    ports:
      - "10054:10054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../blockchain/network/crypto-config/peerOrganizations/customs.dln.com/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - dln-fabric

  orderer.dln.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.dln.com
    environment:
      FABRIC_LOGGING_SPEC: INFO
      ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
      ORDERER_GENERAL_LISTENPORT: 7050
      ORDERER_GENERAL_GENESISMETHOD: file
      ORDERER_GENERAL_GENESISFILE: /var/hyperledger/orderer/orderer.genesis.block
      ORDERER_GENERAL_LOCALMSPID: OrdererMSP
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_ENABLED: "true"
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_TLS_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ../blockchain/network/channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ../blockchain/network/crypto-config/ordererOrganizations/dln.com/orderers/orderer.dln.com/msp:/var/hyperledger/orderer/msp
      - ../blockchain/network/crypto-config/ordererOrganizations/dln.com/orderers/orderer.dln.com/tls/:/var/hyperledger/orderer/tls
      - orderer.dln.com:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
    networks:
      - dln-fabric

  peer0.shipper.dln.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.shipper.dln.com
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: dln-fabric
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_GOSSIP_USELEADERELECTION: "true"
      CORE_PEER_GOSSIP_ORGLEADER: "false"
      CORE_PEER_PROFILE_ENABLED: "true"
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer0.shipper.dln.com
      CORE_PEER_ADDRESS: peer0.shipper.dln.com:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0.shipper.dln.com:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.shipper.dln.com:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.shipper.dln.com:7051
      CORE_PEER_LOCALMSPID: ShipperMSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
    volumes:
      - /var/run/:/host/var/run/
      - ../blockchain/network/crypto-config/peerOrganizations/shipper.dln.com/peers/peer0.shipper.dln.com/msp:/etc/hyperledger/fabric/msp
      - ../blockchain/network/crypto-config/peerOrganizations/shipper.dln.com/peers/peer0.shipper.dln.com/tls:/etc/hyperledger/fabric/tls
      - ../blockchain/network/crypto-config/peerOrganizations/shipper.dln.com/users/Admin@shipper.dln.com/msp:/etc/hyperledger/fabric/users/Admin@shipper.dln.com/msp
      - ../blockchain/network/crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ../blockchain/network/channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - peer0.shipper.dln.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "7051:7051"
    depends_on:
      - orderer.dln.com
    networks:
      - dln-fabric

  peer0.carrier.dln.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.carrier.dln.com
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: dln-fabric
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_GOSSIP_USELEADERELECTION: "true"
      CORE_PEER_GOSSIP_ORGLEADER: "false"
      CORE_PEER_PROFILE_ENABLED: "true"
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer0.carrier.dln.com
      CORE_PEER_ADDRESS: peer0.carrier.dln.com:9051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:9051
      CORE_PEER_CHAINCODEADDRESS: peer0.carrier.dln.com:9052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:9052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.carrier.dln.com:9051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.carrier.dln.com:9051
      CORE_PEER_LOCALMSPID: CarrierMSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
    volumes:
      - /var/run/:/host/var/run/
      - ../blockchain/network/crypto-config/peerOrganizations/carrier.dln.com/peers/peer0.carrier.dln.com/msp:/etc/hyperledger/fabric/msp
      - ../blockchain/network/crypto-config/peerOrganizations/carrier.dln.com/peers/peer0.carrier.dln.com/tls:/etc/hyperledger/fabric/tls
      - ../blockchain/network/crypto-config/peerOrganizations/carrier.dln.com/users/Admin@carrier.dln.com/msp:/etc/hyperledger/fabric/users/Admin@carrier.dln.com/msp
      - ../blockchain/network/crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ../blockchain/network/channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - peer0.carrier.dln.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "9051:9051"
    depends_on:
      - orderer.dln.com
    networks:
      - dln-fabric

  peer0.customs.dln.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.customs.dln.com
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: dln-fabric
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_GOSSIP_USELEADERELECTION: "true"
      CORE_PEER_GOSSIP_ORGLEADER: "false"
      CORE_PEER_PROFILE_ENABLED: "true"
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer0.customs.dln.com
      CORE_PEER_ADDRESS: peer0.customs.dln.com:11051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:11051
      CORE_PEER_CHAINCODEADDRESS: peer0.customs.dln.com:11052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:11052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.customs.dln.com:11051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.customs.dln.com:11051
      CORE_PEER_LOCALMSPID: CustomsMSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
    volumes:
      - /var/run/:/host/var/run/
      - ../blockchain/network/crypto-config/peerOrganizations/customs.dln.com/peers/peer0.customs.dln.com/msp:/etc/hyperledger/fabric/msp
      - ../blockchain/network/crypto-config/peerOrganizations/customs.dln.com/peers/peer0.customs.dln.com/tls:/etc/hyperledger/fabric/tls
      - ../blockchain/network/crypto-config/peerOrganizations/customs.dln.com/users/Admin@customs.dln.com/msp:/etc/hyperledger/fabric/users/Admin@customs.dln.com/msp
      - ../blockchain/network/crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ../blockchain/network/channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - peer0.customs.dln.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "11051:11051"
    depends_on:
      - orderer.dln.com
    networks:
      - dln-fabric

  cli:
    image: hyperledger/fabric-tools:2.5
    container_name: cli
    tty: true
    stdin_open: true
    environment:
      GOPATH: /opt/gopath
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_ID: cli
      CORE_PEER_ADDRESS: peer0.shipper.dln.com:7051
      CORE_PEER_LOCALMSPID: ShipperMSP
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_TLS_CERT_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/shipper.dln.com/peers/peer0.shipper.dln.com/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/shipper.dln.com/peers/peer0.shipper.dln.com/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/shipper.dln.com/peers/peer0.shipper.dln.com/tls/ca.crt
      CORE_PEER_MSPCONFIGPATH: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/shipper.dln.com/users/Admin@shipper.dln.com/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/:/host/var/run/
      - ../blockchain/chaincode/:/opt/gopath/src/github.com/chaincode
      - ../blockchain/network/crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/
      - ../blockchain/network/channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
    depends_on:
      - peer0.shipper.dln.com
      - peer0.carrier.dln.com
      - peer0.customs.dln.com
    networks:
      - dln-fabric
