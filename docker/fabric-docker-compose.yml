version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Hyperledger Fabric Docker Network
# Starts: 1 Orderer + 2 Peers (1 per org) + 2 CAs + 1 CLI
# ─────────────────────────────────────────────────────────────────────────────

networks:
  dln-fabric:
    driver: bridge

volumes:
  orderer.dln.com:
  peer0.org1.dln.com:
  peer0.org2.dln.com:

services:

  # ── Certificate Authority — Org1 ──────────────────────────────────────────
  ca.org1.dln.com:
    image: hyperledger/fabric-ca:1.5
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-org1
      FABRIC_CA_SERVER_TLS_ENABLED: "false"
      FABRIC_CA_SERVER_PORT: 7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../network/crypto-config/peerOrganizations/org1.dln.com/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - dln-fabric

  # ── Certificate Authority — Org2 ──────────────────────────────────────────
  ca.org2.dln.com:
    image: hyperledger/fabric-ca:1.5
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-org2
      FABRIC_CA_SERVER_TLS_ENABLED: "false"
      FABRIC_CA_SERVER_PORT: 8054
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../network/crypto-config/peerOrganizations/org2.dln.com/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - dln-fabric

  # ── Orderer ───────────────────────────────────────────────────────────────
  orderer.dln.com:
    image: hyperledger/fabric-orderer:2.5
    environment:
      FABRIC_LOGGING_SPEC: INFO
      ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
      ORDERER_GENERAL_LISTENPORT: 7050
      ORDERER_GENERAL_GENESISMETHOD: file
      ORDERER_GENERAL_GENESISFILE: /var/hyperledger/orderer/orderer.genesis.block
      ORDERER_GENERAL_LOCALMSPID: OrdererMSP
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_ENABLED: "true"
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_TLS_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ../network/channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ../network/crypto-config/ordererOrganizations/dln.com/orderers/orderer.dln.com/msp:/var/hyperledger/orderer/msp
      - ../network/crypto-config/ordererOrganizations/dln.com/orderers/orderer.dln.com/tls/:/var/hyperledger/orderer/tls
      - orderer.dln.com:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
    networks:
      - dln-fabric

  # ── Peer — Org1 ───────────────────────────────────────────────────────────
  peer0.org1.dln.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: dln-fabric
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_GOSSIP_USELEADERELECTION: "true"
      CORE_PEER_GOSSIP_ORGLEADER: "false"
      CORE_PEER_PROFILE_ENABLED: "true"
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer0.org1.dln.com
      CORE_PEER_ADDRESS: peer0.org1.dln.com:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0.org1.dln.com:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.org1.dln.com:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.org1.dln.com:7051
      CORE_PEER_LOCALMSPID: Org1MSP
    volumes:
      - /var/run/:/host/var/run/
      - ../network/crypto-config/peerOrganizations/org1.dln.com/peers/peer0.org1.dln.com/msp:/etc/hyperledger/fabric/msp
      - ../network/crypto-config/peerOrganizations/org1.dln.com/peers/peer0.org1.dln.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org1.dln.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "7051:7051"
    depends_on:
      - orderer.dln.com
    networks:
      - dln-fabric

  # ── Peer — Org2 ───────────────────────────────────────────────────────────
  peer0.org2.dln.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: dln-fabric
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_GOSSIP_USELEADERELECTION: "true"
      CORE_PEER_GOSSIP_ORGLEADER: "false"
      CORE_PEER_PROFILE_ENABLED: "true"
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer0.org2.dln.com
      CORE_PEER_ADDRESS: peer0.org2.dln.com:9051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:9051
      CORE_PEER_CHAINCODEADDRESS: peer0.org2.dln.com:9052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:9052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.org2.dln.com:9051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.org2.dln.com:9051
      CORE_PEER_LOCALMSPID: Org2MSP
    volumes:
      - /var/run/:/host/var/run/
      - ../network/crypto-config/peerOrganizations/org2.dln.com/peers/peer0.org2.dln.com/msp:/etc/hyperledger/fabric/msp
      - ../network/crypto-config/peerOrganizations/org2.dln.com/peers/peer0.org2.dln.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org2.dln.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "9051:9051"
    depends_on:
      - orderer.dln.com
    networks:
      - dln-fabric

  # ── CLI — used by start-network.sh to run peer commands ──────────────────
  cli:
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      GOPATH: /opt/gopath
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_ID: cli
      CORE_PEER_ADDRESS: peer0.org1.dln.com:7051
      CORE_PEER_LOCALMSPID: Org1MSP
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_TLS_CERT_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dln.com/peers/peer0.org1.dln.com/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dln.com/peers/peer0.org1.dln.com/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dln.com/peers/peer0.org1.dln.com/tls/ca.crt
      CORE_PEER_MSPCONFIGPATH: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dln.com/users/Admin@org1.dln.com/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/:/host/var/run/
      - ../chaincode/:/opt/gopath/src/github.com/chaincode
      - ../network/crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/
      - ../network/channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
    depends_on:
      - peer0.org1.dln.com
      - peer0.org2.dln.com
    networks:
      - dln-fabric
