# crypto-config.yaml — 3-Org DLN-Lite Network
# Org1: Shipping Line, Org2: Port Authority, Org3: Customs Body

OrdererOrgs:
  - Name: Orderer
    Domain: dln.com
    Specs:
      - Hostname: orderer

PeerOrgs:
  - Name: Org1
    Domain: org1.dln.com
    EnableNodeOUs: true
    Template:
      Count: 1
    Users:
      Count: 1

  - Name: Org2
    Domain: org2.dln.com
    EnableNodeOUs: true
    Template:
      Count: 1
    Users:
      Count: 1

  - Name: Org3
    Domain: org3.dln.com
    EnableNodeOUs: true
    Template:
      Count: 1
    Users:
      Count: 1
