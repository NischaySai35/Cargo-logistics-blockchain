# configtx.yaml - 3-Org DLN-Lite Channel Configuration
# Application policy: MAJORITY endorsement, so 2 of 3 logistics orgs must endorse.

Organizations:

  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/dln.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"

  - &Shipper
    Name: ShipperMSP
    ID: ShipperMSP
    MSPDir: crypto-config/peerOrganizations/shipper.dln.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('ShipperMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('ShipperMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('ShipperMSP.member')"
      Endorsement:
        Type: Signature
        Rule: "OR('ShipperMSP.peer')"
    AnchorPeers:
      - Host: peer0.shipper.dln.com
        Port: 7051

  - &Carrier
    Name: CarrierMSP
    ID: CarrierMSP
    MSPDir: crypto-config/peerOrganizations/carrier.dln.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('CarrierMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('CarrierMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('CarrierMSP.member')"
      Endorsement:
        Type: Signature
        Rule: "OR('CarrierMSP.peer')"
    AnchorPeers:
      - Host: peer0.carrier.dln.com
        Port: 9051

  - &Customs
    Name: CustomsMSP
    ID: CustomsMSP
    MSPDir: crypto-config/peerOrganizations/customs.dln.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('CustomsMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('CustomsMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('CustomsMSP.member')"
      Endorsement:
        Type: Signature
        Rule: "OR('CustomsMSP.peer')"
    AnchorPeers:
      - Host: peer0.customs.dln.com
        Port: 11051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: solo
  Addresses:
    - orderer.dln.com:7050
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  LogisticsOrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Consortiums:
      DLNConsortium:
        Organizations:
          - *Shipper
          - *Carrier
          - *Customs

  LogisticsChannel:
    Consortium: DLNConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Shipper
        - *Carrier
        - *Customs
      Capabilities:
        <<: *ApplicationCapabilities
